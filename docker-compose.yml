services:
  postgres:
    image: postgres:16.4-alpine3.20
    container_name: codepulse-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-codepulse}
      POSTGRES_USER: ${POSTGRES_USER:-codepulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codepulse123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7.4.1-alpine3.20
    container_name: codepulse-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: codepulse-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:6333/healthz >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend-ai:
    profiles: ["app"]
    build:
      context: ./backend-ai
    environment:
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-change-me-internal-api-key}
      FASTAPI_PORT: 8000
      SPRING_BOOT_BASE_URL: http://backend-core:8080
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      LLM_PROVIDER: ${LLM_PROVIDER:-fallback}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local}
      CODEPULSE_WORKSPACE_ROOT: /tmp/codepulse
      REPORT_PATH: /tmp/codepulse-reports
    volumes:
      - codepulse_tmp:/tmp/codepulse
      - reports_data:/tmp/codepulse-reports
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    expose:
      - "8000"
    restart: unless-stopped

  backend-core:
    profiles: ["app"]
    build:
      context: ./backend-core
    environment:
      APP_ENV: ${APP_ENV:-local}
      OPEN_SOURCE_MODE: ${OPEN_SOURCE_MODE:-true}
      ENFORCE_USAGE_LIMITS: ${ENFORCE_USAGE_LIMITS:-false}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-key-change-this-to-something-long}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-change-me-internal-api-key}
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-codepulse}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-codepulse}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-codepulse123}
      FASTAPI_BASE_URL: http://backend-ai:8000
      FRONTEND_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      backend-ai:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    profiles: ["app"]
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
        CORE_API_BASE_URL: http://backend-core:8080
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
      CORE_API_BASE_URL: http://backend-core:8080
    ports:
      - "3000:3000"
    depends_on:
      backend-core:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  codepulse_tmp:
  reports_data:
