server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/codepulse
    username: codepulse
    password: codepulse123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}

jwt:
  secret: your-super-secret-key-change-this-to-something-long
  expiration: 86400000

fastapi:
  base-url: http://localhost:8000