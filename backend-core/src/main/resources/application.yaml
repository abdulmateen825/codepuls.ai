server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/codepulse}
    username: ${SPRING_DATASOURCE_USERNAME:codepulse}
    password: ${SPRING_DATASOURCE_PASSWORD:codepulse123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID:}
            client-secret: ${GITHUB_CLIENT_SECRET:}

jwt:
  secret: ${JWT_SECRET:your-super-secret-key-change-this-to-something-long}
  expiration: ${JWT_EXPIRATION:86400000}

fastapi:
  base-url: ${FASTAPI_BASE_URL:http://localhost:8000}

frontend:
  allowed-origins: ${FRONTEND_ALLOWED_ORIGINS:http://localhost:3000}
