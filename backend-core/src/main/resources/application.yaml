server:
  port: ${SERVER_PORT:8080}

app:
  environment: ${APP_ENV:local}
  open-source-mode: ${OPEN_SOURCE_MODE:true}
  enforce-usage-limits: ${ENFORCE_USAGE_LIMITS:false}
  max-scans-per-user: ${MAX_SCANS_PER_USER:0}
  max-concurrent-scans: ${MAX_CONCURRENT_SCANS:0}
  report-storage-mode: ${REPORT_STORAGE_MODE:database}
  report-storage-path: ${REPORT_STORAGE_PATH:/var/lib/codepulse/reports}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/codepulse}
    username: ${SPRING_DATASOURCE_USERNAME:codepulse}
    password: ${SPRING_DATASOURCE_PASSWORD:codepulse123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: ${SPRING_JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID:}
            client-secret: ${GITHUB_CLIENT_SECRET:}

jwt:
  secret: ${JWT_SECRET:your-super-secret-key-change-this-to-something-long}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

fastapi:
  base-url: ${FASTAPI_BASE_URL:http://localhost:8000}
  internal-api-key: ${INTERNAL_API_KEY:change-me-internal-api-key}

frontend:
  allowed-origins: ${FRONTEND_ALLOWED_ORIGINS:http://localhost:3000}

logging:
  level:
    root: ${LOG_LEVEL:INFO}
